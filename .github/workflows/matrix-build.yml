name: Build & Push CD matrix

# GitHub variables:
# (inherit from build-push.yml)

# GitHub secrets:
# (inherit from build-push.yml)

on:

  # Run on schedule
  schedule:
    # Daily at 5 AM and 5 PM (UTC)
    - cron: '0 5,17 * * *'

  # Run on manual triggers
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Limit build to a specific Python version (e.g. 3.13.14, 3.14, 3).'
        type: string
        required: false
      poetry_version:
        description: 'Limit build to a specific Poetry version (e.g. 2.3.4, 2.3, 2).'
        type: string
        required: false
      uv_version:
        description: 'Limit build to a specific uv version (e.g. 0.9.5, 0.9).'
        type: string
        required: false
      skip_published_tags:
        description: 'Skip tags already published to the registry. Disable to force rebuild of published tags.'
        type: boolean
        required: false
        default: true

# Set default GITHUB_TOKEN permissions for the workflow
permissions:
  contents: read

# Set workflow concurrency rules
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:

  # Prepare job
  prepare:
    name: Prepare build matrix

    # https://github.com/actions/runner-images/blob/main/images/ubuntu-slim/ubuntu-slim-Readme.md
    runs-on: ubuntu-slim
    timeout-minutes: 10

    # Run if push to some registry is enabled
    if: |
      vars.DHCR_ENABLED == 'true' ||
      vars.GHCR_ENABLED == 'true' ||
      vars.CUSTOM_CR_ENABLED == 'true'

    # Set environment variables for the job
    env:
      IMAGES_SUFFIX: ''
      PUSH_PLATFORMS: ${{ vars.PUSH_PLATFORMS }}

    outputs:
      matrix: ${{ steps.outputs.outputs.matrix }}

    steps:

      # Initialization steps

      - name: Checkout
        uses: actions/checkout@v6

      # Dependency steps

      - name: Install jq
        run: |
          # apt-get install jq
          sudo apt-get -q update
          sudo apt-get -qy install --no-install-recommends jq

      - name: Install yq
        env:
          YQ_VERSION: v4.53.3
          YQ_ARCH: linux_amd64
        run: |
          # Install yq
          sudo curl -SL \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_${YQ_ARCH}" \
            -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      # Execution steps

      - name: Install deps
        run: |
          uv sync --frozen

      - name: Detect Python versions
        env:
          PYTHON_VERSION: ${{ inputs.python_version }}
        run: |
          # python detect-versions.py python --version PYTHON_VERSION
          uv run python ./scripts/detect-versions.py python --version "${PYTHON_VERSION}"

      - name: Detect Poetry versions
        env:
          POETRY_VERSION: ${{ inputs.poetry_version }}
        run: |
          # python detect-versions.py poetry --version POETRY_VERSION
          uv run python ./scripts/detect-versions.py poetry --version "${POETRY_VERSION}"

      - name: Detect uv versions
        env:
          UV_VERSION: ${{ inputs.uv_version }}
        run: |
          # python detect-versions.py uv --version UV_VERSION
          uv run python ./scripts/detect-versions.py uv --version "${UV_VERSION}"

      - name: Compute build matrix
        env:
          SKIP_PUBLISHED_TAGS: ${{ inputs.skip_published_tags }}
        run: |
          # python build-matrix.py --skip-published-tags SKIP_PUBLISHED_TAGS
          uv run python ./scripts/build-matrix.py \
            --skip-published-tags "${SKIP_PUBLISHED_TAGS:-true}"

      - name: Build matrix from detected versions
        run: |
          # Build job matrix from detected versions
          set -euo pipefail

          # Load helper scripts
          . ./.github/workflows/scripts/set_github_env.sh

          # Transform list of build matrix entries
          # to job matrix configuration in JSON format.
          # Limit to 5 entries to avoid overwhelming CI.
          MATRIX_JSON="$(
            yq -o=json e '.build_matrix' dist/build-matrix.yml \
            | jq -c '{ include: .[0:5] }'
          )"

          set_github_env 'MATRIX_JSON' "${MATRIX_JSON}" non-optional non-secret verbose

      - name: Set job outputs
        id: outputs
        env:
          MATRIX_JSON: ${{ env.MATRIX_JSON }}
        run: |
          # Set job output variables

          # Load helper scripts
          . ./.github/workflows/scripts/set_github_output.sh

          set_github_output 'matrix' "${MATRIX_JSON}" non-optional verbose

  # Run workflow for each build matrix entry
  build-push:
    name: Run workflow

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    # Job dependencies
    needs:
      - prepare

    # Set GITHUB_TOKEN permissions for the job
    permissions:
      contents: read
      packages: write

    uses: ./.github/workflows/build-push.yml
    with:
      python_version: ${{ matrix.python_version }}
      python_image_variant: ${{ matrix.python_image_variant }}
      poetry_version: ${{ matrix.poetry_version }}
      uv_version: ${{ matrix.uv_version }}
      python_tag_level: ${{ matrix.python_tag_level }}
      poetry_tag_level: ${{ matrix.poetry_tag_level }}
      uv_tag_level: ${{ matrix.uv_tag_level }}
    secrets: inherit
