name: Orchestrate Devbox image builds

# GitHub variables:
# - (inherit from build-push.yml)

# GitHub secrets:
# - (inherit from build-push.yml)
# - GITHUB_READ_TOKEN

# Helper scripts:
# - ./.github/workflows/scripts/set_github_env.sh
# - ./.github/workflows/scripts/set_github_output.sh

on:

  # Run on workflow calls
  workflow_call:
    inputs:
      images_prefix:
        description: 'Images prefix (e.g. devbox-python, devbox-python-node)'
        type: string
      src_dirname:
        description: 'Source directory name (e.g. python, node)'
        type: string
      package_versions:
        description: 'Comma-separated list or JSON list of package versions to build'
        type: string
        required: false
      base_variants:
        description: 'Comma-separated list or JSON list of base variants to build (e.g. "", "slim", "alpine")'
        type: string
        required: false
      skip_published_tags:
        description: 'Skip tags already published to the registry. Disable to force rebuild of published tags.'
        type: boolean
        required: false
        default: true
    secrets:
      GITHUB_READ_TOKEN:
        required: false
      # Inherited from build-push.yml:
      DHCR_TOKEN:
        required: false
      CUSTOM_CR_TOKEN:
        required: false

  # Run on manual triggers
  workflow_dispatch:
    inputs:
      images_prefix:
        description: 'Images prefix (e.g. devbox-python, devbox-python-node)'
        type: string
      src_dirname:
        description: 'Source directory name (e.g. python, node)'
        type: string
      package_versions:
        description: 'Comma-separated list or JSON list of package versions to build'
        type: string
        required: false
      base_variants:
        description: 'Comma-separated list or JSON list of base variants to build (e.g. "", "slim", "alpine")'
        type: string
        required: false
      skip_published_tags:
        description: 'Skip tags already published to the registry. Disable to force rebuild of published tags.'
        type: boolean
        required: false
        default: true

# Set default GITHUB_TOKEN permissions for the workflow
permissions:
  contents: read

# Set workflow concurrency rules
concurrency:
  group: ${{ github.workflow }}-${{ inputs.images_prefix }}-${{ inputs.src_dirname }}-${{ inputs.package_versions }}-${{ inputs.base_variants }}
  cancel-in-progress: true

jobs:

  # Prepare job
  prepare:
    name: Prepare build matrix

    # https://github.com/actions/runner-images/blob/main/images/ubuntu-slim/ubuntu-slim-Readme.md
    runs-on: ubuntu-slim
    timeout-minutes: 10

    # Run if push to some registry is enabled
    if: |
      vars.DHCR_ENABLED == 'true' ||
      vars.GHCR_ENABLED == 'true' ||
      vars.CUSTOM_CR_ENABLED == 'true'

    # Set environment variables for the job
    env:
      IMAGES_SUFFIX: ''
      PUSH_PLATFORMS: ${{ vars.PUSH_PLATFORMS }}

    outputs:
      matrix: ${{ steps.outputs.outputs.matrix }}

    steps:

      # Initialization steps

      - name: Checkout
        uses: actions/checkout@v6

      # Dependency steps

      - name: Install jq
        run: |
          # apt-get install jq
          sudo apt-get -q update
          sudo apt-get -qy install --no-install-recommends jq

      - name: Install yq
        env:
          YQ_VERSION: v4.53.3
          YQ_ARCH: linux_amd64
        run: |
          # Install yq
          sudo curl -SL \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_${YQ_ARCH}" \
            -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Install uv
        uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0

      # Preparation steps

      - name: Download scripts output
        uses: actions/download-artifact@v8
        with:
          name: scripts-output
          path: dist/
        continue-on-error: true

      - name: Set PACKAGE_VERSIONS
        env:
          PACKAGE_VERSIONS: ${{ inputs.package_versions }}
        run: |
          # Set PACKAGE_VERSIONS environment variable

          # Load helper scripts
          . ./.github/workflows/scripts/set_github_env.sh

          if [ -z "${PACKAGE_VERSIONS}" ]; then
            echo 'Error: No package versions provided.'
            exit 1
          fi

          # Convert PACKAGE_VERSIONS from a comma-separated list or JSON list
          # to a newline-separated list of package versions
          CONVERTED_PACKAGE_VERSIONS="$(
            echo "${PACKAGE_VERSIONS}" \
            | jq -Rnrc '
              input
              | if test("^\\s*\\[") then
                  fromjson[]
                else
                  gsub(","; " ")
                  | splits("\\s+")
                end
              | select(length > 0)
              | split("=")
              | "\(.[0])=\(.[1:] | join("="))"
            '
          )"

          set_github_env 'PACKAGE_VERSIONS' "${CONVERTED_PACKAGE_VERSIONS}" non-optional non-secret verbose

      # Execution steps

      - name: Install deps
        run: |
          uv sync --frozen

      - name: Detect Python versions
        env:
          PACKAGE_VERSIONS: ${{ env.PACKAGE_VERSIONS }}
        run: |
          # python detect_versions.py ...PACKAGE_VERSIONS

          # Detect versions for each specified package
          while IFS= read -r package_entry; do

            # Extract package name and version from the entry
            # Remove unlabeled flags ('?') from package names
            package_name="$(
              echo "${package_entry}" \
              | cut -d'=' -f1 \
              | sed 's/^[[:space:]]*//;s/[[:space:]]*$//;s/?$//' \
              | tr '[:upper:]' '[:lower:]'
            )"
            package_version="$(echo "${package_entry}" | cut -d'=' -f2-)"

            # Skip if package name is empty
            if [ -z "${package_name}" ]; then
              continue
            fi

            # Skip if versions retrieved from parent workflow
            if [ -f ./dist/versions.yml ]; then
              has_versions="$(
                package_name="${package_name}" \
                yq e '
                  .detected_versions
                  | has(env(package_name))
                ' ./dist/versions.yml
              )"
              if [ "${has_versions}" == 'true' ]; then
                echo "Detected versions for package '${package_name}' retrieved from parent workflow. Skipping detection."
                continue
              fi
            fi

            echo "Detecting versions for package '${package_name}' with version '${package_version}'..."
            uv run python -m scripts.detect_versions "${package_name}" --version "${package_version}"

          done <<< "${PACKAGE_VERSIONS}"

      - name: Fetch already published tags
        if: ${{ inputs.skip_published_tags == 'true' }}
        env:
          GITHUB_READ_TOKEN: ${{ secrets.GITHUB_READ_TOKEN }}
          IMAGES_PREFIX: ${{ inputs.images_prefix }}
        run: |
          # python fetch_published_tags.py

          # Skip if published tags retrieved from parent workflow
          if [ -f ./dist/published_tags.yml ]; then
            has_published_tags="$(
              yq e '
                .published_tags
                | has(env(IMAGES_PREFIX))
              ' ./dist/published_tags.yml
            )"
            if [ "${has_published_tags}" == 'true' ]; then
              echo "Published tags for image prefix '${IMAGES_PREFIX}' retrieved from parent workflow. Skipping fetch."
              exit 0
            fi
          fi

          # Append with published tags from parent workflow (if any)
          uv run python -m scripts.fetch_published_tags --append "${IMAGES_PREFIX}" || true

      - name: Compute build matrix
        env:
          BASE_VARIANTS: ${{ inputs.base_variants }}
          PACKAGE_VERSIONS: ${{ env.PACKAGE_VERSIONS }}
        run: |
          # python build_matrix.py ...PACKAGES

          # List specified package names (without versions) with unlabeled flags ('?')
          PACKAGES="$(
            echo "${PACKAGE_VERSIONS}" \
            | cut -d'=' -f1 \
            | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
            | tr '[:upper:]' '[:lower:]' \
            | tr '\n' ','
          )"

          # Compute build matrix for specified packages
          rm -f ./dist/build_matrix.yml
          uv run python -m scripts.build_matrix --append \
            --base-variants "${BASE_VARIANTS}" \
            ${PACKAGES}

      - name: Build matrix from detected versions
        run: |
          # Build job matrix from detected versions
          set -euo pipefail

          # Load helper scripts
          . ./.github/workflows/scripts/set_github_env.sh

          # Transform list of build matrix entries
          # to job matrix configuration in JSON format.
          # Limit to 5 entries to avoid overwhelming CI.
          MATRIX_JSON="$(
            yq -o=json e '.build_matrix' ./dist/build_matrix.yml \
            | jq -c '{ include: .[0:5] }'
          )"

          set_github_env 'MATRIX_JSON' "${MATRIX_JSON}" non-optional non-secret verbose

      - name: Set job outputs
        id: outputs
        env:
          MATRIX_JSON: ${{ env.MATRIX_JSON }}
        run: |
          # Set job output variables

          # Load helper scripts
          . ./.github/workflows/scripts/set_github_output.sh

          set_github_output 'matrix' "${MATRIX_JSON}" non-optional verbose

  # Run image build for each matrix entry
  build-push:
    name: Run image build

    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    # Job dependencies
    needs:
      - prepare

    # Set GITHUB_TOKEN permissions for the job
    permissions:
      contents: read
      packages: write

    uses: ./.github/workflows/build-push.yml
    with:
      images_prefix: ${{ inputs.images_prefix }}
      src_dirname: ${{ inputs.src_dirname }}
      image_tag_components: ${{ matrix.image_tag_components }}
      build_args: ${{ matrix.build_args }}
    secrets: inherit
