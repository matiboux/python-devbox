# Configuration of version constraints, used for build matrix generation.

python:
  # Minimum Python version to support
  min_version: "3.10"
  # Additional legacy Python versions to include
  extra_versions: []
  # Specific Python versions to skip
  skip_versions: []

poetry:
  # Minimum Poetry version to support
  min_version: "2.1"
  # Additional legacy Poetry versions to include
  extra_versions: ["1.8"]
  # Specific Poetry versions to skip
  skip_versions: []

uv:
  # Minimum uv version to support
  min_version: "0.8"
  # Additional legacy uv versions to include
  extra_versions: []
  # Specific uv versions to skip
  skip_versions: []

node:
  # Minimum nvm version to support
  min_version: "26"
  # Additional legacy nvm versions to include
  extra_versions: ["22", "24"]
  # Specific nvm versions to skip
  skip_versions: []

nvm:
  # Minimum nvm version to support
  min_version: "0.40"
  # Additional legacy nvm versions to include
  extra_versions: []
  # Specific nvm versions to skip
  skip_versions: []
